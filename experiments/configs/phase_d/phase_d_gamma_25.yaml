environment:
  max_episode_steps: 200
  element_budget: 30
  gamma_c: 25.0
  rl_iterations_per_timestep: 10
  min_rl_iterations: 10
  max_rl_iterations: 10
  max_consecutive_no_action: 30
  step_domain_fraction: 0.1
  initial_refinement:
    mode: random
    fixed_level: 2
    max_initial_level: 4
    probability: 0.7
training:
  total_timesteps: 100000
  algorithm: A2C
  learning_rate: 0.0003
  n_steps: 5
  ent_coef: 0.01
  callback: enhanced
solver:
  nop: 4
  max_level: 8
  courant_max: 0.1
  icase: 1
  initial_elements:
    - -1
    - -0.4
    - 0
    - 0.4
    - 1
  verbose: false
  balance: false